{% load i18n static %}
<div class="departamento-select-wrapper">
    <select name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
    {% if widget.attrs.placeholder %}<option value="">{{ widget.attrs.placeholder }}</option>{% endif %}
    {% for group_name, group_choices, group_index in widget.optgroups %}
        {% if group_name %}
            <optgroup label="{{ group_name }}">
        {% endif %}
        {% for option in group_choices %}
            {% include option.template_name with widget=option %}
        {% endfor %}
        {% if group_name %}
            </optgroup>
        {% endif %}
    {% endfor %}
    </select>
    <div class="departamento-search-info">
        <small class="text-muted">Comece a digitar para buscar departamentos...</small>
    </div>
</div>
