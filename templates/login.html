<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Arquivo Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Admin CSS -->
    {% load static %}
    <link href="{% static 'css/tailwind-admin.css' %}?v=20240427" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-600 to-indigo-700 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 hover:scale-105">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-center">
                <div class="w-20 h-20 bg-white rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="fas fa-landmark text-3xl text-blue-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">Sistema de Arquivo Digital</h2>
                <p class="text-blue-100">Câmara Municipal de Parauapebas</p>
            </div>
            
            <!-- Body -->
            <div class="p-8">
                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} mb-6 fade-in">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <!-- Login Form -->
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    <!-- Username -->
                    <div class="form-group">
                        <label for="username" class="form-label">
                            <i class="fas fa-user mr-2"></i>
                            Usuário
                        </label>
                        <div class="input-group">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" 
                                   id="username" 
                                   name="username" 
                                   class="form-control input-with-icon" 
                                   placeholder="Digite seu usuário" 
                                   required>
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock mr-2"></i>
                            Senha
                        </label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" 
                                   id="password" 
                                   name="password" 
                                   class="form-control input-with-icon" 
                                   placeholder="Digite sua senha" 
                                   required>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button type="submit" class="btn btn-primary w-full justify-center">
                            <i class="fas fa-sign-in-alt mr-2"></i>
                            Entrar no Sistema
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Footer -->
            <div class="bg-gray-50 px-8 py-4 border-t border-gray-200">
                <div class="text-center">
                    <a href="{% url 'admin:index' %}" class="text-gray-600 hover:text-blue-600 transition-colors text-sm font-medium">
                        <i class="fas fa-cog mr-2"></i>
                        Acesso Administrativo
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Additional Info -->
        <div class="mt-8 text-center">
            <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 text-white">
                <p class="text-sm mb-2">
                    <i class="fas fa-shield-alt mr-2"></i>
                    Acesso seguro ao sistema
                </p>
                <p class="text-xs opacity-75">
                    Câmara Municipal de Parauapebas - Sistema de Gestão Documental
                </p>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Auto-focus on username field
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
        
        // Add loading state to submit button
        document.querySelector('form').addEventListener('submit', function() {
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Autenticando...';
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
