name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-only-for-tests
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1,http://testserver
      DEBUG: "False"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Lint (fatal issues only)
        run: flake8 config apps/core apps/documentos apps/caixas apps/backup --exclude=migrations --select=E9,F63,F7,F82

      - name: Testes críticos de segurança e backup
        run: python manage.py test apps.documentos.tests apps.caixas.tests apps.backup.tests
